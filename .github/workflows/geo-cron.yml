name: ゲオモバイル スマホ監視

on:
  schedule:
    # 毎時00分に実行（JST = UTC+9）
    - cron: '0 * * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # geo_state.json をコミットし直すために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 依存関係をインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: ゲオモバイル監視スクリプトを実行
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GEO_LINE_USER_ID: ${{ secrets.GEO_LINE_USER_ID }}
          TZ: Asia/Tokyo
        run: python geo_monitor.py

      - name: 状態ファイルの変更をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geo_state.json
          if git diff --cached --quiet; then
            echo "変化なし。コミットをスキップ"
          else
            git commit -m "chore: geo_state.json を更新 [skip ci]"
            git push
          fi
